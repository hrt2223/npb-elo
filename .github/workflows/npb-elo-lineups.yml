name: NPB 2026 Lineup Quick Update

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: npb-2026-data-update
  cancel-in-progress: false

jobs:
  update-lineups:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npb/2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: npb/2026/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update today schedule, lineups, standings, and site
        run: |
          python scripts/update_today_probabilities.py
          python scripts/fetch_lineups_2026.py --minutes-before 60
          python scripts/fetch_upcoming_schedule_2026.py
          python scripts/fetch_standings_2026.py
          python scripts/make_site.py

      - name: Commit updated lineup data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/today_probabilities.csv output/today_lineups.csv output/upcoming_schedule.csv output/standings.csv site
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update 2026 NPB lineups"
            git push
          fi
