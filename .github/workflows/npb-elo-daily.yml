name: NPB 2026 Elo Daily Update

on:
  schedule:
    # 00:00 UTC = 09:00 JST. Updates today's schedule and win probabilities.
    - cron: "0 0 * * *"
    # 14:55 UTC = 23:55 JST. This avoids depending on the local PC.
    - cron: "55 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: npb/2026

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: npb/2026/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Fetch current month and today results
        run: |
          MONTH=$(python -c "from datetime import datetime, timedelta, timezone; print(datetime.now(timezone(timedelta(hours=9))).month)")
          python fetch_results_2026.py --month "$MONTH" --merge-existing

      - name: Update Elo outputs
        run: |
          python update_daily.py
          python make_elo_tables.py
          python make_elo_graphs.py
          python update_today_probabilities.py
          python make_site.py

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add game_results_jp_2026.csv output site
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update 2026 NPB Elo results"
            git push
          fi
