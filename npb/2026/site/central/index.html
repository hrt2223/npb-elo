<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>セ・リーグ 順位表 - 2026 NPB Elo</title>
  <style>
    :root {
      --bg: #07090d;
      --surface: #10141d;
      --ink: #edf2f7;
      --muted: #9aa4b2;
      --line: #252d3a;
      --accent: #38bdf8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      background:
        radial-gradient(circle at 50% -18%, rgba(56, 189, 248, 0.14), transparent 35%),
        linear-gradient(180deg, #0b111a 0%, var(--bg) 42%, #050608 100%);
      color: var(--ink);
    }
    main {
      max-width: 1080px;
      margin: 0 auto;
      padding: 28px 22px 40px;
    }
    a {
      color: #7dd3fc;
      text-decoration: none;
      font-weight: 700;
    }
    a:hover { text-decoration: underline; }
    .back {
      display: inline-flex;
      margin-bottom: 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .hero {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: linear-gradient(180deg, rgba(21, 27, 38, 0.96), rgba(10, 14, 21, 0.96));
      padding: 22px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.15;
      letter-spacing: 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(16, 20, 29, 0.94);
      overflow: hidden;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.24), inset 0 1px 0 rgba(255, 255, 255, 0.035);
      margin-bottom: 16px;
    }
    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(21, 27, 38, 0.72);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-weight: 800;
    }
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      white-space: nowrap;
      color: #dbe3ee;
    }
    th, td {
      padding: 10px 11px;
      border-bottom: 1px solid #202733;
      text-align: right;
    }
    th {
      background: #151b26;
      color: #cbd5e1;
      font-weight: 800;
    }
    th:first-child, td:first-child,
    th:nth-child(2), td:nth-child(2) {
      text-align: left;
    }
    tbody tr:hover {
      background: rgba(56, 189, 248, 0.06);
    }
    .standings-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 11px 12px;
      background: #111827;
      border-bottom: 1px solid var(--line);
      color: #f8fafc;
      font-weight: 800;
      font-size: 13px;
    }
    .standings-title span:last-child {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
      white-space: nowrap;
    }
    .standings-team {
      display: flex;
      align-items: center;
      gap: 8px;
      text-align: left;
      font-weight: 800;
      color: #f8fafc;
    }
    .team-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      box-shadow: 0 0 18px currentColor;
      flex: 0 0 auto;
    }
    .team-links {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }
    .team-link {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #0b1018;
      color: #edf2f7;
    }
    .team-link:hover {
      border-color: rgba(125, 211, 252, 0.45);
      background: #111827;
      text-decoration: none;
    }
    .empty { padding: 24px; color: var(--muted); }
    @media (max-width: 760px) {
      .team-links { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      h1 { font-size: 28px; }
    }
    @media (max-width: 520px) {
      main { padding: 20px 14px 32px; }
      .team-links { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../index.html">← ダッシュボードへ戻る</a>
    <section class="hero">
      <h1>セ・リーグ 順位表</h1>
    </section>

    <section class="panel">
      <div class="panel-header">
        <span>順位表</span>
        <a href="../../output/standings.csv">CSV</a>
      </div>
      
    <section class="standings-table">
      <div class="standings-title">
        <span>セ・リーグ</span>
        <span>2026-06-10 現在</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>順位</th><th>球団</th><th>試合</th><th>勝</th><th>敗</th><th>分</th><th>勝率</th><th>差</th></tr>
          </thead>
          <tbody><tr><td>1</td><td class="standings-team"><span class="team-dot" style="background:#f47b20"></span>巨人</td><td>60</td><td>33</td><td>25</td><td>2</td><td>.569</td><td>--</td></tr><tr><td>2</td><td class="standings-team"><span class="team-dot" style="background:#f7d417"></span>阪神</td><td>58</td><td>32</td><td>25</td><td>1</td><td>.561</td><td>0.5</td></tr><tr><td>3</td><td class="standings-team"><span class="team-dot" style="background:#1f9d55"></span>ヤクルト</td><td>60</td><td>32</td><td>27</td><td>1</td><td>.542</td><td>1.5</td></tr><tr><td>4</td><td class="standings-team"><span class="team-dot" style="background:#00a9e0"></span>DeNA</td><td>60</td><td>25</td><td>33</td><td>2</td><td>.431</td><td>8.0</td></tr><tr><td>5</td><td class="standings-team"><span class="team-dot" style="background:#d71920"></span>広島</td><td>57</td><td>21</td><td>33</td><td>3</td><td>.389</td><td>10.0</td></tr><tr><td>6</td><td class="standings-team"><span class="team-dot" style="background:#003f7f"></span>中日</td><td>60</td><td>21</td><td>38</td><td>1</td><td>.356</td><td>12.5</td></tr></tbody>
        </table>
      </div>
    </section>
    
    </section>

    <section class="panel">
      <div class="panel-header">球団ページ</div>
      <div class="team-links"><a class="team-link" href="hanshin.html"><span class="team-dot" style="background:#f7d417"></span>阪神</a><a class="team-link" href="giants.html"><span class="team-dot" style="background:#f47b20"></span>巨人</a><a class="team-link" href="carp.html"><span class="team-dot" style="background:#d71920"></span>広島</a><a class="team-link" href="dragons.html"><span class="team-dot" style="background:#003f7f"></span>中日</a><a class="team-link" href="dena.html"><span class="team-dot" style="background:#00a9e0"></span>DeNA</a><a class="team-link" href="swallows.html"><span class="team-dot" style="background:#1f9d55"></span>ヤクルト</a></div>
    </section>
  </main>
</body>
</html>
